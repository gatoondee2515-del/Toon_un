<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classification - Teachable Machine</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --success: #10B981;
            --bg-dark: #0F172A;
            --bg-card: #1E293B;
            --text-main: #F8FAFC;
            --text-muted: #94A3B8;
            --border: #334155;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-card);
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            padding: 32px;
            border: 1px solid var(--border);
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818CF8, #34D399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Status & Timer Section */
        .status-panel {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }

        .status-value {
            font-size: 18px;
            font-weight: 600;
        }

        #timer-value {
            color: #F59E0B;
        }

        /* Layout Grid */
        .app-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (min-width: 640px) {
            .app-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Video / Webcam Container */
        .webcam-box {
            background: #0F172A;
            border-radius: 16px;
            overflow: hidden;
            border: 2px dashed var(--border);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .webcam-box.active {
            border-style: solid;
            border-color: var(--primary);
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror Effect */
        }

        .placeholder-text {
            color: var(--text-muted);
            font-size: 14px;
            position: absolute;
            z-index: 1;
        }

        /* Prediction Labels Container */
        .results-box {
            background: rgba(15, 23, 42, 0.4);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-align: left;
        }

        .results-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .prediction-row {
            margin-bottom: 12px;
        }

        .prediction-info {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .bar-container {
            background: #334155;
            border-radius: 9999px;
            height: 8px;
            overflow: hidden;
        }

        .bar-fill {
            background: linear-gradient(to right, #6366F1, #10B981);
            height: 100%;
            width: 0%;
            transition: width 0.2s ease-out;
        }

        /* Trigger Logs */
        .logs-box {
            background: #0F172A;
            border-radius: 12px;
            padding: 12px;
            text-align: left;
            max-height: 120px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
            color: #34D399;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .log-item {
            margin-bottom: 4px;
        }

        /* Styled Button */
        .btn-start {
            background: linear-gradient(135deg, var(--primary), #6366F1);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.5);
            background: var(--primary-hover);
        }

        .btn-start:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Teachable Machine Intelligence Tracker</h1>
        <p class="subtitle">ระบบตรวจจับและวิเคราะห์ภาพอัตโนมัติ ทุกๆ 3 นาที</p>

        <!-- Status Panel -->
        <div class="status-panel">
            <div class="status-item">
                <span class="status-label">สถานะกล้อง</span>
                <span id="camera-status" class="status-value" style="color: #EF4444;">ปิดใช้งาน</span>
            </div>
            <div class="status-item">
                <span class="status-label">รอบถัดไปในอีก</span>
                <span class="status-value" id="timer-value">--:--</span>
            </div>
        </div>

        <!-- App Workspace -->
        <div class="app-grid">
            <!-- Webcam Screen -->
            <div class="webcam-box" id="webcam-box">
                <div class="placeholder-text" id="placeholder">กดปุ่มด้านล่างเพื่อเริ่มการทำงาน</div>
                <div id="webcam-container"></div>
            </div>

            <!-- AI Classification Results -->
            <div class="results-box">
                <div class="results-title">ผลการวิเคราะห์ล่าสุด (Real-time Preview)</div>
                <div id="label-container">
                    <!-- Dynamic Progress Bars will go here -->
                </div>
            </div>
        </div>

        <!-- Trigger Logs -->
        <div class="logs-box" id="logs-container">
            <div class="log-item">[ระบบ] รอการเริ่มต้นทำงาน...</div>
        </div>

        <!-- Action Button -->
        <button type="button" class="btn-start" id="start-btn" onclick="init()">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            เริ่มต้นระบบอัตโนมัติ
        </button>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ลิงก์โมเดล Teachable Machine ของคุณ
        const URL = "https://teachablemachine.withgoogle.com/models/RvhIhkIP-W/";
        let model, webcam, labelContainer, maxPredictions;
        
        // ตั้งค่าตัวจับเวลาทุกๆ 3 นาที (3 * 60 วินาที)
        const INTERVAL_TIME = 3 * 60 * 1000; 
        let countdownValue = INTERVAL_TIME / 1000;
        let timerInterval;

        // ฟังก์ชันเริ่มต้นโหลดโมเดลและเปิดกล้อง
        async function init() {
            document.getElementById("start-btn").disabled = true;
            addLog("กำลังดาวน์โหลด AI Model และเปิดสิทธิ์ใช้งานกล้อง...");

            try {
                const modelURL = URL + "model.json";
                const metadataURL = URL + "metadata.json";

                model = await tmImage.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                // ตั้งค่าเว็บแคมและปรับขนาดให้พอดีหน้าจอ
                const flip = true; 
                webcam = new tmImage.Webcam(400, 400, flip); 
                await webcam.setup(); 
                await webcam.play();
                
                // ปรับแต่ง UI เมื่อกล้องเปิดสำเร็จ
                document.getElementById("placeholder").style.display = "none";
                document.getElementById("webcam-box").classList.add("active");
                document.getElementById("camera-status").innerText = "เปิดใช้งาน";
                document.getElementById("camera-status").style.color = "#10B981";
                
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = ""; // ล้าง Component เก่า

                // สร้างดีไซน์ Progress Bar แบบไดนามิกตามคลาสที่มีในโมเดล
                for (let i = 0; i < maxPredictions; i++) {
                    const row = document.createElement("div");
                    row.className = "prediction-row";
                    row.innerHTML = `
                        <div class="prediction-info">
                            <span class="class-name">--</span>
                            <span class="class-percentage">0%</span>
                        </div>
                        <div class="bar-container">
                            <div class="bar-fill"></div>
                        </div>
                    `;
                    labelContainer.appendChild(row);
                }

                addLog("เชื่อมต่อกล้องและโมเดลสำเร็จ เริ่มต้นระบบลูปอัตโนมัติ!");
                
                // ดึงภาพสด (Live Stream Preview) บนหน้าจออย่างลื่นไหล
                window.requestAnimationFrame(loop);
                
                // ทำการประเมินและสั่งงานรอบแรกทันที พร้อมเริ่มเวลานับถอยหลัง 3 นาที
                triggerEvaluation();
                startCountdown();

            } catch (error) {
                console.error(error);
                addLog("เกิดข้อผิดพลาด: ไม่สามารถใช้งานกล้องหรือดาวน์โหลดโมเดลได้");
                document.getElementById("start-btn").disabled = false;
            }
        }

        // ลูปเว็บแคมเพื่อให้สตรีมภาพบน Canvas สดอยู่ตลอดเวลา
        async function loop() {
            webcam.update();
            await updateRealTimeUI(); // แสดงแถบเปอร์เซ็นต์แบบสมูทบนหน้าจอ
            window.requestAnimationFrame(loop);
        }

        // ฟังก์ชันอัปเดตแถบ UI แสดงผลความน่าจะเป็น (Real-time Preview)
        async function updateRealTimeUI() {
            if (!model || !webcam) return;
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const className = prediction[i].className;
                const probability = prediction[i].probability;
                const percentText = (probability * 100).toFixed(0) + "%";
                
                const rows = labelContainer.getElementsByClassName("prediction-row");
                if(rows[i]) {
                    rows[i].querySelector(".class-name").innerText = className;
                    rows[i].querySelector(".class-percentage").innerText = percentText;
                    rows[i].querySelector(".bar-fill").style.width = percentText;
                }
            }
        }

        // ฟังก์ชันหัวใจสำคัญ: ดึงค่าและส่งสรุปผลการวิเคราะห์อย่างเป็นทางการทุกๆ 3 นาที
        async function triggerEvaluation() {
            if (!model || !webcam) return;
            
            addLog("⚡ [Action Triggered] ระบบกำลังบันทึกภาพและประมวลผลรอบปัจจุบัน...");
            
            const prediction = await model.predict(webcam.canvas);
            
            // ค้นหา Class ที่มีค่า Probability สูงที่สุดในวินาทีนั้น
            let bestClass = "";
            let highestProb = -1;
            
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestClass = prediction[i].className;
                }
            }
            
            const finalPercent = (highestProb * 100).toFixed(1);
            addLog(`🎯 สรุปผลรอบนี้: ตรวจพบ [${bestClass}] ด้วยความมั่นใจ ${finalPercent}%`);
            
            /* 
               💡 [คำแนะนำสำหรับนักพัฒนา]: 
               คุณสามารถเพิ่มคำสั่งส่งข้อมูลต่อยอดในฟังก์ชันนี้ได้ทันที เช่น:
               - ยิง fetch() หรือ axios ส่ง JSON ไปยัง Backend API
               - ยิง Webhook ไปหา LINE Notify / Discord Webhook
            */
        }

        // ระบบตัวนับถอยหลังและทำงานซ้ำทุก 3 นาทีอย่างเที่ยงตรง
        function startCountdown() {
            clearInterval(timerInterval);
            countdownValue = INTERVAL_TIME / 1000; // แปลงเป็นวินาที
            
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                countdownValue--;
                updateTimerDisplay();

                if (countdownValue <= 0) {
                    triggerEvaluation(); // เมื่อเวลาหมด ทำการวิเคราะห์ภาพทันที
                    countdownValue = INTERVAL_TIME / 1000; // รีเซ็ตตัวนับกลับเป็น 3 นาทีใหม่
                }
            }, 1000);
        }

        // แสดงผลเวลารูปแบบ mm:ss (เช่น 03:00)
        function updateTimerDisplay() {
            const minutes = Math.floor(countdownValue / 60);
            const seconds = countdownValue % 60;
            document.getElementById("timer-value").innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // ระบบบันทึกการทำงานลงใน UI Log Terminal ด้านล่าง
        function addLog(message) {
            const container = document.getElementById("logs-container");
            const now = new Date();
            const timeStr = now.toTimeString().split(' ')[0];
            
            const logItem = document.createElement("div");
            logItem.className = "log-item";
            logItem.innerText = `[${timeStr}] ${message}`;
            
            container.appendChild(logItem);
            container.scrollTop = container.scrollHeight; // Auto scroll ลงล่างสุด
        }
    </script>
</body>
</html>
